base_path: "."

components:
  terraform:
    command: "tofu"
    base_path: "components/terraform"
    apply_auto_approve: true
    auto_generate_backend_file: true
    deploy_run_init: true
    destroy_auto_approve: true
    init_run_reconfigure: true
  
stacks:
  base_path: "stacks"
  included_paths:
    - "deploy/**/*"
  exclude_paths:
    - "**/_defaults.yaml"
  name_template: "home-lab"

workflows:
  base_path: "stacks/workflows"

stores:
  home-lab/gcp:
    type: google-secret-manager
    options:
      project_id: "prj-home-lab"

validate:
  editorconfig:
  config_file_paths:
    - ".editorconfig"
  exclude:
    - ".terraform/**"
  disable_max_line_length: true
  disable_trim_trailing_whitespace: true

templates:
  settings:
    enabled: true
    evalutions: 2
    gomplate:
      enabled: true
    sprig:
      enabled: true

settings:
  experimental: silence
  telemetry: 
    enabled: false
