---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-deploy
  namespace: flux-system
spec:
  targetNamespace: envoy-gateway-system
  path: ./infra/envoy/deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-resources
  namespace: flux-system
spec:
  targetNamespace: envoy-gateway-system
  dependsOn:
    - name: envoy-deploy
  path: ./infra/envoy/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
