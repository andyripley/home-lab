apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloudflare-cert
  namespace: default
spec:
  secretName: cloudflare-cert
  dnsNames:
    - "ley.rip"
    - "*.ley.rip"
  issuerRef:
    group: cert-manager.io
    name: cloudflare-issuer
    kind: ClusterIssuer
  usage:
    - digital signature
    - key encipherment
