apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  releaseName: traefik
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  targetNamespace: traefik
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  values:
    ports:
      web:
        port: 80
        nodePort: 30000
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        port: 443
        nodePort: 30001
    ingressClass:
      enabled: false
    providers:
      kubernetesIngress:
        enabled: false
      kubernetesGateway:
        enabled: true
    gateway:
      addresses:
        - type: IPAddress
          value: 10.13.37.24
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 443
          protocol: HTTPS 
          namespacePolicy:
            from: All
          mode: Terminate
          certificateRefs:    
            - kind: Secret
              name: cloudflare-cert
              group: ""
  install:
    createNamespace: false
