# clusters/my-cluster/gateway-api/crds-kustomization.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: gateway-api-crds
  path: ./config/crd/experimental
  prune: true
  wait: true
