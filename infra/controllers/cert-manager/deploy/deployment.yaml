apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  releaseName: cert-manager
  chartRef:
    kind: OCIRepository
    name: cert-manager
    namespace: cert-manager
  targetNamespace: cert-manager
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    config:
      enableGatewayAPI: true
    crds:
      enabled: true
    dns01RecursiveNameservers: "1.1.1.1:53"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 64Mi
    webhook:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 64Mi
    cainjector:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 64Mi
