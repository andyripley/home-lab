apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-key
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-manager
    kind: SecretStore
  target:
    name: cloudflare-api-key
    creationPolicy: Owner
  data:
  - secretKey: cloudflare
    remoteRef:
      key: api_token
