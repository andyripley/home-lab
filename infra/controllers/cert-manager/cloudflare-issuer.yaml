apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cloudflare-issuer
spec:
  acme:
    email: andy@ley.rip
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: cloudflare-key
    solvers:
    - dns01:
        cloudflare:
          email: andy@ley.rip
          apiTokenSecretRef:
            namespace: cert-manager
            name: cloudflare-api-token
            key: api-key
