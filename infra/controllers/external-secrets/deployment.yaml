apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 10m
  releaseName: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: "2.5.0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets
  targetNamespace: external-secrets
  values:
    installCRDs: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  install:
    createNamespace: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-crds
  namespace: external-secrets
spec:
  interval: 10m
  path: ./config/crds/bases
  prune: true
  sourceRef:
    kind: GitRepository
    name: external-secrets-git
    namespace: external-secrets
  targetNamespace: external-secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-crs
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-crds
  interval: 10m
  path: ./infra/controllers/external-secrets/crs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
