---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-crds
  namespace: flux-system
spec:
  interval: 8h
  path: ./config/crds/bases
  prune: true
  sourceRef:
    kind: GitRepository
    name: external-secrets-git
    namespace: external-secrets
  targetNamespace: external-secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-deploy
  namespace: flux-system
spec:
  targetNamespace: external-secrets
  dependsOn:
    - name: external-secrets-crds
  path: ./infra/controllers/external-secrets/deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 2h
  retryInterval: 1m
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-resources
  namespace: flux-system
spec:
  targetNamespace: external-secrets
  dependsOn:
    - name: external-secrets-deploy
  path: ./infra/controllers/external-secrets/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 2h
  retryInterval: 1m
  timeout: 5m
