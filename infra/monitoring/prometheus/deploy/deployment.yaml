apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 1h
  timeout: 10m
  releaseName: kube-prometheus-stack
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 85.3.3
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: monitoring
  targetNamespace: monitoring
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    prometheus:
      prometheusSpec:
        nodeSelector:
          topoology.kubernetes.io/zone: "pve2"
        storageSpec:
          volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi
            volumeName: pv-prometheus
            
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 20G
            selector:
              matchLabels:
                app: prometheus
    grafana:
      enabled: false
    nodeExporter:
      enabled: false
