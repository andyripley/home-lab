apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-deploy
  namespace: flux-system
spec:
  targetNamespace: monitoring
  path: ./infra/monitoring/prometheus/deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 2h
  retryInterval: 1m
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-resources
  namespace: flux-system
spec:
  targetNamespace: monitoring
  path: ./infra/monitoring/prometheus/resources
  dependsOn:
    - name: prometheus-deploy
    - name: envoy-resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 2h
  retryInterval: 1m
  timeout: 5m
