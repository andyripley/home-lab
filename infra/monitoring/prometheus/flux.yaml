apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-deploy
  namespace: flux-system
spec:
  targetNamespace: monitoring
  path: ./infra/monitoring/prometheus/deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 1h
  retryInterval: 1m
  timeout: 5m
