apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: "grafana"
spec:
  config:
    log:
      mode: "console"
    auth:
      disable_login_form: "true"
    server:
      root_url: https://grafana.ley.rip
  disableDefaultAdminSecret: true
  httpRoute:
    spec:
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
      hostnames:
        - grafana.ley.rip
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      key: grafana-admin
                      name: username
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: grafana-admin
                      name: password
