apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: grafana
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: grafana-operator
    namespace: monitoring
  maxHistory: 5
  install:
    crds: CreateReplace
    serverSideApply: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    leaderElect: true
    serviceMonitor:
      enabled: true
    dashboard:
      enabled: true
    crds:
      immutable: false
