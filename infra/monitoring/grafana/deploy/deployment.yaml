apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 1h
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      version: 5.2.3
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  targetNamespace: monitoring
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    serviceMonitor:
      enabled: true
    dashboard:
      enabled: true
