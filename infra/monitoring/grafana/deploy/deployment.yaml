apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: monitoring
spec:
  interval: 1h
  releaseName: grafana
  chart:
    spec:
      chart: grafana-operator
      version: v5.2.3
      sourceRef:
        kind: HelmRepository
        name: grafana-operator
        namespace: monitoring
  targetNamespace: monitoring
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    serviceMonitor:
      enabled: true
    dashboard:
      enabled: true
