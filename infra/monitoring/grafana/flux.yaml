apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator-crds
  namespace: flux-system
spec:
  interval: 10m
  path: ./config/crd
  prune: true
  sourceRef:
    kind: GitRepository
    name: grafana-operator-git
    namespace: monitoring
  targetNamespace: monitoring
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-deploy
  namespace: flux-system
spec:
  targetNamespace: monitoring
  dependsOn:
    - name: grafana-operator-crds
  path: ./infra/monitoring/grafana/deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 1h
  retryInterval: 1m
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-resources
  namespace: flux-system
spec:
  targetNamespace: monitoring
  dependsOn:
    - name: grafana-deploy
  path: ./infra/monitoring/grafana/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 1h
  retryInterval: 1m
  timeout: 5m
