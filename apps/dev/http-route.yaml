apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
  namespace: dev
spec:
  parentRefs:
  - kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
  hostnames:
  - "whoami.ley.rip"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: nginx-test-service
      port: 80
